name: Mint AXN Identifier

on:
  issues:
    types: [opened]

jobs:
  mint:
    if: startsWith(github.event.issue.title, '[DEPOSIT]')
    concurrency:
      group: mint-axn
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process deposit and mint AXN
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            
            const AXN_GLYPHS = [
              '\u{1F311}','\u{1F312}','\u{1F313}','\u{1F314}','\u{1F315}','\u{1F316}','\u{1F317}','\u{1F318}','\u2B50','\u{1F31F}','\u{1F4AB}','\u2600\uFE0F','\u{1F319}','\u{1FA90}','\u{1F30D}','\u{1F30A}',
              '\u{1F525}','\u{1F4A7}','\u{1F32A}\uFE0F','\u26A1','\u2744\uFE0F','\u{1F30B}','\u{1F3D4}\uFE0F','\u{1F33F}','\u{1F343}','\u{1F331}','\u{1F33E}','\u{1FAA8}','\u{1F48E}','\u{1F9CA}','\u{1F308}','\u2601\uFE0F',
              '\u{1F3DB}\uFE0F','\u{1F3D7}\uFE0F','\u{1F9F1}','\u{1FA9C}','\u{1F6AA}','\u{1FA9F}','\u{1F3E0}','\u{1F3F0}','\u26E9\uFE0F','\u{1F54C}','\u{1F5FC}','\u{1F309}','\u2693','\u{1F6E1}\uFE0F','\u{1F514}','\u{1F3FA}',
              '\u{1F527}','\u{1F529}','\u2699\uFE0F','\u{1F517}','\u{1FA9D}','\u{1F9F2}','\u2696\uFE0F','\u{1F52C}','\u{1F52D}','\u{1F9EA}','\u{1F9EB}','\u{1F9EC}','\u{1F4A1}','\u{1F52E}','\u{1FA84}','\u{1F5DD}\uFE0F',
              '\u{1F4DC}','\u{1F4D6}','\u{1F4DD}','\u270F\uFE0F','\u{1F58A}\uFE0F','\u{1F4CB}','\u{1F4CC}','\u{1F4CE}','\u{1F516}','\u{1F4DA}','\u{1F5C2}\uFE0F','\u{1F4E6}','\u{1F3F7}\uFE0F','\u{1FAA7}','\u{1F4D0}','\u{1F4CF}',
              '\u{1F9ED}','\u{1F5FA}\uFE0F','\u{1F3F4}','\u{1F6A9}','\u26F3','\u{1F3AF}','\u{1F50D}','\u{1F441}\uFE0F','\u{1F50E}','\u{1FA9E}','\u{1F5E1}\uFE0F','\u{1F6E4}\uFE0F','\u26F5','\u{1F680}','\u{1F6F8}','\u{1F300}',
              '\u231B','\u23F0','\u{1F550}','\u{1F551}','\u{1F552}','\u{1F553}','\u{1F554}','\u{1F555}','\u{1F556}','\u{1F557}','\u{1F558}','\u{1F559}','\u{1F55A}','\u{1F55B}','\u231B','\u{1F504}',
              '\u{1F338}','\u{1F33A}','\u{1F33B}','\u{1F339}','\u{1F340}','\u{1F332}','\u{1F333}','\u{1F341}','\u{1F342}','\u{1F344}','\u{1F41A}','\u{1FAB8}','\u{1F98B}','\u{1F41D}','\u{1F54A}\uFE0F','\u{1F985}',
              '\u2660\uFE0F','\u2764\uFE0F','\u2666\uFE0F','\u2663\uFE0F','\u{1F3AD}','\u{1F3AA}','\u{1F3A8}','\u{1F3B5}','\u{1F3B6}','\u{1F3B9}','\u{1F3BB}','\u{1F3BA}','\u{1F941}','\u{1F3B2}','\u{1F0CF}','\u{1F004}',
              '\u2795','\u2796','\u2716\uFE0F','\u2797','\u267E\uFE0F','\u222E','\u2295','\u2297','\u25B3','\u25BD','\u25C7','\u25CB','\u25CF','\u25A1','\u25A0','\u25B2',
              '\u{1F701}','\u{1F74A}','\u263F','\u2643','\u2644','\u2645','\u2646','\u2609','\u263D','\u2648','\u2649','\u264A','\u264B','\u264C','\u264D','\u264E',
              '\u{1F441}\u200D\u{1F5E8}','\u{1F932}','\u{1F450}','\u{1F64F}','\u270A','\u{1F91D}','\u{1F446}','\u{1F447}','\u{1F448}','\u{1F449}','\u{1FAF5}','\u{1F590}\uFE0F','\u270B','\u{1FAF6}','\u{1F919}','\u{1F44B}',
              '\u{1F6A8}','\u{1F534}','\u{1F7E0}','\u{1F7E1}','\u{1F7E2}','\u{1F535}','\u{1F7E3}','\u26AA','\u26AB','\u{1F7E4}','\u{1F49C}','\u{1F499}','\u{1F49A}','\u{1F49B}','\u{1F9E1}','\u2764\uFE0F',
              '\u{1F53A}','\u{1F53B}','\u25C0\uFE0F','\u25B6\uFE0F','\u{1F53C}','\u{1F53D}','\u23E9','\u23EA','\u23EB','\u23EC','\u2197\uFE0F','\u2198\uFE0F','\u2199\uFE0F','\u2196\uFE0F','\u{1F503}','\u{1F500}',
              '\u{1F305}','\u{1F304}','\u{1F303}','\u{1F306}','\u{1F307}','\u{1F3D9}\uFE0F','\u{1F30C}','\u{1F386}','\u{1F387}','\u2728','\u{1F320}','\u{1F4A5}','\u{1F506}','\u{1F505}','\u2B55','\u274C',
              '\u{1F3C1}','\u{1F3AC}','\u{1F51A}','\u{1F519}','\u{1F51B}','\u{1F51D}','\u{1F51C}','\u23F9\uFE0F','\u23CF\uFE0F','\u{1F512}','\u{1F513}','\u{1F510}','\u{1F5FF}','\u{1FAA6}','\u267B\uFE0F','\u221E'
            ];
            
            const CLUSTERS = ['Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Celestial','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Elemental','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Architectural','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Instrumental','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Scriptural','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Navigational','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Temporal','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Organic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Symbolic','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Mathematical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Alchemical','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Gestural','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Signal','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Structural','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Liminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal','Terminal'];
            
            const W = {Celestial:'Origin',Elemental:'Force',Architectural:'Foundation',Instrumental:'Method',Scriptural:'Text',Navigational:'Search',Temporal:'Duration',Organic:'Growth',Symbolic:'Play',Mathematical:'Proof',Alchemical:'Transmutation',Gestural:'Touch',Signal:'Alarm',Structural:'Direction',Liminal:'Threshold',Terminal:'Closure'};
            
            // Parse issue
            const issue = context.payload.issue;
            const body = issue.body || '';
            
            function extractField(body, label) {
              const regex = new RegExp('### ' + label + '\\s*\\n\\s*([\\s\\S]*?)(?=\\n###|$)', 'i');
              const match = body.match(regex);
              if (match) {
                const val = match[1].trim();
                if (val === '_No response_' || val === 'None') return '';
                return val;
              }
              return '';
            }
            
            const metadata = {
              title: extractField(body, 'Title') || issue.title.replace('[DEPOSIT] ', ''),
              creator: extractField(body, 'Creator'),
              orcid: extractField(body, 'ORCID'),
              date: extractField(body, 'Date') || new Date().toISOString().split('T')[0],
              description: extractField(body, 'Description'),
              content_type: extractField(body, 'Content Type'),
              license: extractField(body, 'License'),
              substrate: extractField(body, 'Substrate Disclosure'),
              keywords: extractField(body, 'Keywords'),
              related_ids: extractField(body, 'Related Identifiers'),
              version: extractField(body, 'Version'),
              methodology: extractField(body, 'Methodology'),
              falsification: extractField(body, 'Falsification Conditions'),
              files_text: extractField(body, 'Files')
            };
            
            // Compute AXN from content
            const contentForHash = [metadata.title, metadata.creator, metadata.description, body].join('\n');
            const hash = crypto.createHash('sha256').update(contentForHash).digest();
            const hexHash = hash.toString('hex');
            
            const emoji = [AXN_GLYPHS[hash[0]], AXN_GLYPHS[hash[1]], AXN_GLYPHS[hash[2]], AXN_GLYPHS[hash[3]]].join('');
            const clusters = [CLUSTERS[hash[0]], CLUSTERS[hash[1]], CLUSTERS[hash[2]], CLUSTERS[hash[3]]];
            const reading = clusters.map(c => W[c]).join(' \u2192 ');
            
            // Registry
            const registryPath = 'data/registry.json';
            const registry = JSON.parse(fs.readFileSync(registryPath, 'utf-8'));
            const depositNum = registry.total_deposits + 1;
            const hexPos = depositNum.toString(16).padStart(2, '0').toUpperCase();
            
            // Auto-detect family
            let family = 'UNCLASSIFIED';
            const kw = (metadata.keywords + ' ' + metadata.description).toLowerCase();
            const familyMap = {
              GOVERNANCE: ['governance','policy','platform','moderation'],
              EMPIRICAL: ['capture','dataset','observation','measurement'],
              GENERATIVE: ['generative','creative','literary','poetic'],
              ARCHIVAL: ['archive','preservation','registry','catalog'],
              PHILOLOGICAL: ['critical edition','philology','manuscript'],
              STRUCTURAL: ['architecture','structure','framework','specification'],
              COMPOSITIONAL: ['composition','layer','mediation','reception'],
              OPERATIVE: ['operative','semiotics','operator'],
              HETERONYMIC: ['heteronym','pessoa','dodecad']
            };
            for (const [fam, terms] of Object.entries(familyMap)) {
              if (terms.some(t => kw.includes(t))) { family = fam; break; }
            }
            
            const axn = 'AXN:' + hexPos + '.' + family + '.' + emoji;
            
            const record = {
              axn, hex: hexPos, family, emoji, hash: hexHash,
              title: metadata.title, creator: metadata.creator,
              orcid: metadata.orcid, date: metadata.date,
              description: metadata.description,
              content_type: metadata.content_type,
              license: metadata.license,
              substrate: metadata.substrate,
              keywords: metadata.keywords.split(',').map(k => k.trim()).filter(Boolean),
              related_ids: metadata.related_ids,
              version: metadata.version || 'v1.0',
              methodology: metadata.methodology,
              falsification: metadata.falsification,
              issue_number: issue.number,
              issue_url: issue.html_url,
              minted_at: new Date().toISOString(),
              status: 'MINTED_UNREVIEWED',
              clusters, reading,
              axn_canonical: hexHash,
              axn_display: emoji,
              wiki_article: null,
              wiki_status: 'provisional',
              entities: [],
              entity_status: 'provisional'
            };
            
            registry.deposits.push(record);
            registry.total_deposits = registry.deposits.length;
            fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2));
            
            // Build comment
            const lines = [
              '## \u2705 Deposit Minted',
              '',
              '### Alexanarch Identifier',
              '',
              '```',
              axn,
              '```',
              '',
              '| Component | Value |',
              '|-----------|-------|',
              '| **Hex Position** | ' + hexPos + ' |',
              '| **Semantic Family** | ' + family + ' |',
              '| **Emoji Hash** | ' + emoji + ' |',
              '| **Clusters** | ' + clusters.join(' \u00B7 ') + ' |',
              '| **Reading** | ' + reading + ' |',
              '| **SHA-256** | `' + hexHash.substring(0, 24) + '...` |',
              '| **Content Type** | ' + metadata.content_type + ' |',
              '| **Substrate** | ' + metadata.substrate + ' |',
              '| **License** | ' + metadata.license + ' |',
              '| **Wiki/Graph** | Provisional (pending full-text review) |',
              '',
              '---',
              '*The obelus follows from reading. The identifier follows from the content.*',
              '',
              '\u222E = 1'
            ];
            
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, body: lines.join('\n')
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, labels: ['minted', 'family:' + family]
            });
            
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, name: 'pending-review'
              });
            } catch (e) {}
            
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, name: 'mint-approved'
              });
            } catch (e) {}
            
            console.log('Minted: ' + axn);

      - name: Generate wiki and entities (optional)
        if: success()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            if (!process.env.ANTHROPIC_API_KEY) {
              console.log('No API key - skipping wiki/entity generation');
              return;
            }
            const fs = require('fs');
            const https = require('https');
            const registry = JSON.parse(fs.readFileSync('data/registry.json', 'utf-8'));
            const deposit = registry.deposits[registry.deposits.length - 1];
            
            function callAPI(prompt) {
              return new Promise((resolve, reject) => {
                const data = JSON.stringify({
                  model: 'claude-sonnet-4-6', max_tokens: 2000,
                  messages: [{role: 'user', content: prompt}]
                });
                const req = https.request({
                  hostname: 'api.anthropic.com', path: '/v1/messages', method: 'POST',
                  headers: {'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'x-api-key': process.env.ANTHROPIC_API_KEY}
                }, res => { let b=''; res.on('data',c=>b+=c); res.on('end',()=>{try{resolve(JSON.parse(b))}catch(e){reject(e)}}); });
                req.on('error', reject);
                req.write(data);
                req.end();
              });
            }
            
            try {
              const wikiPrompt = 'Generate a 300-500 word encyclopedia article about this scholarly work. No headers. Third person. Just the article text.\n\n' +
                'Title - ' + deposit.title + '\n' +
                'Description - ' + deposit.description + '\n' +
                'Keywords - ' + (deposit.keywords||[]).join(', ');
              const wr = await callAPI(wikiPrompt);
              deposit.wiki_article = wr.content?.[0]?.text || '';
              deposit.wiki_status = 'provisional-generated';
              
              const entityPrompt = 'Extract entities and relationships as a JSON array of triples. Each has subject, predicate, object, type, evidence_status. Types - concept, person, institution, method, work. Predicates - defines, extends, critiques, cites, documents, proposes, is_instance_of, created_by. 15-30 triples. ONLY valid JSON array.\n\n' +
                'Title - ' + deposit.title + '\n' +
                'Description - ' + deposit.description;
              const er = await callAPI(entityPrompt);
              let entities = [];
              try {
                const et = (er.content?.[0]?.text||'').replace(/```json/g,'').replace(/```/g,'').trim();
                entities = JSON.parse(et);
              } catch(e) { console.log('Entity parse error'); }
              deposit.entities = entities;
              deposit.entity_status = 'provisional-generated';
              
              fs.writeFileSync('data/registry.json', JSON.stringify(registry, null, 2));
              console.log('Wiki: ' + (deposit.wiki_article||'').length + ' chars, Entities: ' + entities.length);
            } catch(e) {
              console.log('API failed (likely no credits): ' + (e.message||e));
            }

      - name: Generate deposit MD file
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('data/registry.json', 'utf-8'));
            const d = registry.deposits[registry.deposits.length - 1];
            const n = String(d.issue_number).padStart(4, '0');
            const mdPath = 'data/deposits/AXN-' + n + '.md';
            
            // Ensure directory exists
            if (!fs.existsSync('data/deposits')) fs.mkdirSync('data/deposits', {recursive: true});
            
            let md = '---\n';
            md += 'title: "' + (d.title||'').replace(/"/g, '\\"') + '"\n';
            md += 'axn: "' + d.axn + '"\n';
            md += 'creator: "' + (d.creator||'') + '"\n';
            md += 'date: "' + (d.date||'') + '"\n';
            md += 'content_type: "' + (d.content_type||'') + '"\n';
            md += 'license: "' + (d.license||'') + '"\n';
            md += 'substrate: "' + (d.substrate||'') + '"\n';
            md += 'version: "' + (d.version||'v1.0') + '"\n';
            md += 'hash: "' + (d.hash||'') + '"\n';
            md += 'status: "' + (d.status||'') + '"\n';
            md += '---\n\n';
            md += '# ' + d.title + '\n\n';
            md += '**' + d.creator + '** . ' + d.date + ' . ' + (d.content_type||'') + '\n\n';
            md += '**AXN:** `' + d.axn + '`\n\n';
            md += '## Description\n\n' + (d.description||'') + '\n';
            if (d.methodology) md += '\n## Methodology\n\n' + d.methodology + '\n';
            if (d.falsification) md += '\n## Falsification Conditions\n\n' + d.falsification + '\n';
            md += '\n---\n\n*Minted ' + (d.minted_at||'') + '*\n';
            
            fs.writeFileSync(mdPath, md);
            
            // Update registry with download path
            d.download_md = '/' + mdPath;
            fs.writeFileSync('data/registry.json', JSON.stringify(registry, null, 2));
            
            console.log('MD generated: ' + mdPath + ' (' + md.length + ' chars)');

      - name: Generate static record page
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('data/registry.json', 'utf-8'));
            const d = registry.deposits[registry.deposits.length - 1];
            const n = d.issue_number;
            const W = {Celestial:'Origin',Elemental:'Force',Architectural:'Foundation',Instrumental:'Method',Scriptural:'Text',Navigational:'Search',Temporal:'Duration',Organic:'Growth',Symbolic:'Play',Mathematical:'Proof',Alchemical:'Transmutation',Gestural:'Touch',Signal:'Alarm',Structural:'Direction',Liminal:'Threshold',Terminal:'Closure'};
            
            const cl = (d.clusters||[]).join(' \u00B7 ');
            const rd = (d.clusters||[]).map(function(c){return W[c]||c}).join(' \u2192 ');
            const kws = (d.keywords||[]).map(function(k){return '<span style="display:inline-block;background:#f0f4f8;color:#1a3a5c;padding:2px 8px;border-radius:10px;font-size:.78em;margin:2px">'+k+'</span>'}).join('');
            const esc = function(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};
            
            let mirr = '';
            if(d.mirrors){
              Object.entries(d.mirrors).forEach(function(e){mirr+='<a style="display:inline-block;border:1px solid #e0e0e0;padding:6px 12px;border-radius:4px;font-size:.82em;margin:3px;color:#1a3a5c;text-decoration:none" href="'+e[1]+'" target="_blank">'+e[0]+' \u2192</a> '});
            }
            if(d.download_md){
              mirr+='<a style="display:inline-block;background:#0a7c6a;color:#fff;padding:6px 12px;border-radius:4px;font-size:.82em;margin:3px;text-decoration:none" href="'+d.download_md+'" download>\u2193 MD</a>';
            }
            
            let ent = '';
            (d.entities||[]).forEach(function(x){
              const ev = x.evidence_status||'';
              const evc = ev==='observed'?'color:#0a7c6a':ev==='inferred'?'color:#d4a537':ev==='performative'?'color:#9966cc':'';
              const evt = ev?' <span style="font-size:.65em;font-family:monospace;margin-left:3px;'+evc+'">['+ev+']</span>':'';
              ent+='<div style="display:flex;gap:6px;padding:2px 0;font-size:.82em;border-bottom:1px solid #f8f8f8;flex-wrap:wrap"><span style="font-weight:500;color:#1a3a5c;min-width:140px">'+esc(x.subject)+'</span><span style="color:#0a7c6a;font-family:monospace;font-size:.8em;min-width:80px">'+x.predicate+'</span><span style="color:#444">'+esc(x.object)+evt+'</span></div>';
            });
            
            const jsonld = JSON.stringify({"@context":"https://schema.org","@type":"CreativeWork","name":d.title,"author":{"@type":"Person","name":d.creator},"datePublished":d.date,"identifier":d.axn});
            
            let pg = '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">';
            pg+='<title>'+esc(d.title)+' \u2014 Alexanarch</title>';
            pg+='<meta name="description" content="'+esc((d.description||'').substring(0,200))+'">';
            pg+='<script type="application/ld+json">'+jsonld+'<\/script>';
            pg+='<style>@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap");:root{--bg:#fafafa;--fg:#1a1a1a;--accent:#1a3a5c;--teal:#0a7c6a;--border:#e0e0e0;--surface:#fff;--sans:"IBM Plex Sans",sans-serif;--mono:"IBM Plex Mono",monospace}*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--sans);background:var(--bg);color:var(--fg);line-height:1.8;font-size:15px}.wrap{max-width:720px;margin:0 auto;padding:60px 24px}a{color:var(--accent);text-decoration:none}h1{font-size:1.4em;font-weight:600;color:var(--accent);margin-bottom:8px}h2{font-size:1em;color:var(--accent);margin-top:20px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px}p{margin-bottom:10px;color:#333}.nav{display:flex;gap:12px;margin-bottom:24px;font-size:.85em;overflow-x:auto;white-space:nowrap}.nav a{color:#777;font-weight:500}.footer{margin-top:40px;padding-top:12px;border-top:1px solid var(--border);font-size:.75em;color:#777}</style>';
            pg+='</head><body><div class="wrap">';
            pg+='<nav class="nav"><a href="/">Alexanarch</a> <a href="/s/browse/">Browse</a> <a href="/s/wiki/">Wiki</a> <a href="/s/graph/">Graph</a> <a href="/deposit/">Deposit</a> <a href="/guide/">Guide</a> <a href="/manifest/">Manifest</a></nav>';
            pg+='<div style="font-family:var(--mono);font-size:1.2em;color:var(--teal);background:var(--surface);padding:14px;border-radius:6px;border:1px solid var(--border);border-left:4px solid var(--teal);margin:12px 0">'+d.axn+'<div style="font-size:.7em;color:#777;margin-top:3px">'+cl+'</div><div style="font-size:.78em;color:#888;font-style:italic;margin-top:2px">'+rd+'</div></div>';
            pg+='<h1>'+esc(d.title)+'</h1>';
            pg+='<div style="font-size:.88em;color:#777;margin-bottom:12px">'+esc(d.creator)+' \u00B7 '+d.date+' \u00B7 '+(d.content_type||'')+'</div>';
            pg+='<div style="margin:8px 0">'+mirr+'</div>';
            pg+='<div style="margin:8px 0;font-size:.85em"><strong style="color:var(--accent);font-family:var(--mono);font-size:.82em">Substrate:</strong> '+(d.substrate||'')+'</div>';
            pg+='<div style="font-size:.85em"><strong style="color:var(--accent);font-family:var(--mono);font-size:.82em">License:</strong> '+(d.license||'')+'</div>';
            pg+='<div style="font-size:.85em"><strong style="color:var(--accent);font-family:var(--mono);font-size:.82em">SHA-256:</strong> <span style="font-family:var(--mono);font-size:.75em;word-break:break-all">'+(d.hash||'')+'</span></div>';
            if(kws) pg+='<div style="margin:8px 0">'+kws+'</div>';
            pg+='<h2>Description</h2><p>'+esc(d.description||'')+'</p>';
            if(d.methodology) pg+='<h2>Methodology</h2><p style="font-size:.88em">'+esc(d.methodology)+'</p>';
            if(d.falsification) pg+='<h2>Falsification</h2><p style="font-size:.88em">'+esc(d.falsification)+'</p>';
            if(ent) pg+='<h2>Entity Relations ('+(d.entities||[]).length+')</h2>'+ent;
            if(d.wiki_article) pg+='<h2>Wiki Article</h2><div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;line-height:1.9;color:#333;font-size:.93em;margin:8px 0">'+d.wiki_article+'</div>';
            pg+='<script data-goatcounter="https://alexanarch.goatcounter.com/count" async src="//gc.zgo.at/count.js"><\/script>';
            pg+='<div class="footer"><strong>Alexanarch</strong><div style="margin-top:5px;color:var(--accent)">\u222E = 1</div></div></div></body></html>';
            
            const dir = 's/records/' + n;
            if(!fs.existsSync(dir)) fs.mkdirSync(dir, {recursive: true});
            fs.writeFileSync(dir + '/index.html', pg);
            console.log('Static page generated: ' + dir + '/index.html (' + pg.length + ' chars)');

      - name: Commit registry update
        run: |
          git config user.name "Alexanarch Bot"
          git config user.email "bot@alexanarch.org"
          git pull --rebase || true
          git add data/registry.json
          if git diff --cached --quiet; then
            echo "Registry already up to date"
          else
            git commit -m "Mint AXN - deposit #$(cat data/registry.json | python3 -c 'import sys,json; print(json.load(sys.stdin)["total_deposits"])')"
            git push
          fi
