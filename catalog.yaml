# ── Platform Governance Observatory ───────────────────────────

observatory:
  name: "Platform Governance Observatory"
  description: >
    A research instrument documenting enforcement events,
    platform policy changes, and identifier health across
    the scholarly infrastructure ecosystem.

  schemas:

    incidents:
      description: "Documented enforcement events"
      fields:
        - name: "incident_id"
          type: "string"
          description: "Unique identifier (PGO-INC-NNNN)"
        - name: "date"
          type: "date"
          description: "Date of enforcement action"
        - name: "platform"
          type: "string"
          description: "Platform name"
        - name: "action_type"
          type: "string"
          enum: ["account_termination", "content_removal", "access_restriction", "metadata_stripping", "policy_change", "other"]
        - name: "affected_records"
          type: "integer"
          description: "Number of records affected"
        - name: "private_justification"
          type: "string"
          description: "Justification given in private notice, if any"
        - name: "public_justification"
          type: "string"
          description: "Justification displayed publicly, if any"
        - name: "evidence_classification"
          type: "string"
          enum: ["Observed", "Reported", "Inferred", "Undisclosed"]
        - name: "summary"
          type: "string"
        - name: "related_deposits"
          type: "array"
          description: "AXN identifiers of related analytical works"
        - name: "sources"
          type: "array"
          description: "URLs of evidence (screenshots, issues, notices)"

    policies:
      description: "Versioned platform policy snapshots and diffs"
      fields:
        - name: "policy_id"
          type: "string"
          description: "Unique identifier (PGO-POL-NNNN)"
        - name: "platform"
          type: "string"
        - name: "policy_name"
          type: "string"
        - name: "version_date"
          type: "date"
        - name: "snapshot_url"
          type: "string"
        - name: "archive_url"
          type: "string"
          description: "Wayback Machine or local archive URL"
        - name: "summary_of_changes"
          type: "string"
        - name: "relevance_to_cha"
          type: "string"

    identifier_health:
      description: "Periodic DOI and landing-page resolution tests"
      fields:
        - name: "test_id"
          type: "string"
          description: "Unique identifier (PGO-IDH-NNNN)"
        - name: "test_date"
          type: "date"
        - name: "doi"
          type: "string"
        - name: "expected_url"
          type: "string"
        - name: "actual_url"
          type: "string"
        - name: "http_status"
          type: "integer"
        - name: "resolution_status"
          type: "string"
          enum: ["resolves_correctly", "resolves_to_tombstone", "resolves_to_wrong_page", "does_not_resolve", "timeout"]
        - name: "notes"
          type: "string"

# ── Build configuration ──────────────────────────────────────

build:
  output_dir: "build/"
  formats:
    - "ro-crate"       # RO-Crate 1.2 metadata
    - "data-package"   # Frictionless Data Package
    - "dcat"           # DCAT-AP catalog description
    - "checksums"      # SHA-256 manifest
    - "jsonld-graph"   # JSON-LD linked data graph
    - "nquads"         # N-Quads dump
    - "sitemap"        # XML sitemap
    - "csv-export"     # Flat CSV of all deposits
    - "journal-toc"    # Per-journal table of contents

  deploy_to_root:
    - "ro-crate-metadata.json"
    - "datapackage.json"

  checksums_file: "SHA256SUMS.txt"

# ── Labor constitution ────────────────────────────────────────

labor:
  scholarship_percent: 60
  infrastructure_percent: 25
  monitoring_percent: 15
  max_weekly_maintenance_hours: 1
  rule: >
    Any project requiring more than one hour of routine weekly
    maintenance must either be further automated, receive another
    steward, or be suspended. The architecture succeeds only when
    it returns you to research.
