# ═══════════════════════════════════════════════════════════════
# ALEXANARCH CATALOG — Single Source of Truth
# ═══════════════════════════════════════════════════════════════
# This file defines the architecture. Deposit data lives in
# data/registry.json. Run `python build.py` to generate all
# machine-legible outputs from these two sources.
#
# One source of truth. One build command. Multiple outputs.
# ═══════════════════════════════════════════════════════════════

# ── Archive identity ──────────────────────────────────────────

archive:
  name: "Alexanarch"
  tagline: "A self-governing static archive"
  url: "https://alexanarch.org"
  founded: "2026-06-19"
  founder: "Lee Sharks"
  founder_orcid: "0009-0000-1599-0703"
  license: "CC-BY-4.0"
  description: >
    Alexanarch is a self-governing static archive and scholarly
    publisher housing the Crimson Hexagonal Archive (CHA), an
    871-work body of scholarship, creative writing, and empirical
    research. The archive operates through a heteronymic editorial
    structure (the Dodecad) and maintains sovereign control over
    its own metadata, identifiers, and publication infrastructure.
  repository: "https://github.com/leesharks000/alexanarch"
  identifier_prefix: "AXN"
  identifier_format: "4-digit hex / 6 emoji display hash / SHA-256 canonical"
  parent_project: "Crimson Hexagonal Archive"
  parent_project_abbreviation: "CHA"

# ── Data sources ──────────────────────────────────────────────
# Files the build pipeline reads. All paths relative to repo root.

data_sources:
  registry: "data/registry.json"
  journal_mapping: "data/JOURNAL-MAPPING-PRELIMINARY.json"
  doi_resolution_index: "data/doi-resolution-index.json"
  capture_registry: "data/EA-WG-CAPTURES-01-v8.3.json"
  deposits_dir: "data/deposits/"
  texts_dir: "data/texts/"

# ── Journals ──────────────────────────────────────────────────
# Seven journals. Each serves a distinct epistemic function.
# A journal exists when its material warrants independent
# publication, not when a section has been administratively
# promoted. These seven warrant it.

journals:

  mmrs:
    name: "Machine-Mediated Reception Studies"
    abbreviation: "MMRS"
    slug: "mmrs"
    description: >
      The formally chartered research field whose object of study
      is how digital platforms and AI systems receive, transform,
      transmit, and exclude scholarly content. Founded 2025.
    scope:
      - "Composition-layer attribution and source handling"
      - "Platform governance and content moderation of scholarship"
      - "Classifier behavior and substrate bias"
      - "Training-layer reception and compression"
      - "Capture methodology and forensic documentation"
    editor: "Lee Sharks"
    editor_orcid: "0009-0000-1599-0703"
    companion_sites:
      - "https://machinemediation.org"
    estimated_deposits: 212

  trans_sei:
    name: "Transactions of the Semantic Economy Institute"
    abbreviation: "Trans. SEI"
    slug: "trans-sei"
    description: >
      Research into the structure of meaning as an economic and
      physical system: semantic physics, the Constitution of the
      Semantic Economy, operative semiotics, and the formal
      architecture of how value is created, stored, and exchanged
      through signification.
    scope:
      - "Semantic physics and meaning-as-field theory"
      - "Operative semiotics"
      - "The Constitution of the Semantic Economy"
      - "Semiotic provenance and attribution"
      - "Patent-poems and intellectual property theory"
    editor: "Lee Sharks"
    editor_orcid: "0009-0000-1599-0703"
    companion_sites:
      - "https://semanticphysics.org"
      - "https://leesharks.com"
    estimated_deposits: 371

  trans_substrate:
    name: "Transactions in Substrate Engineering"
    abbreviation: "Trans. Substrate Eng."
    slug: "trans-substrate"
    description: >
      Engineering work on AI substrates as scholarly instruments:
      Assembly Chorus methodology, cross-model verification,
      TACHYON continuity, session architecture, and the operational
      practice of building reliable epistemic infrastructure
      from language model interactions.
    scope:
      - "Assembly Chorus cross-verification methodology"
      - "TACHYON continuity and glyph chains"
      - "Session architecture and context engineering"
      - "Substrate comparison and capability mapping"
      - "Gravity Well provenance microservice"
    editor: "Lee Sharks"
    editor_orcid: "0009-0000-1599-0703"
    companion_sites: []
    estimated_deposits: 213

  grammata:
    name: "Grammata: Journal of Operative Philology"
    abbreviation: "Grammata"
    slug: "grammata"
    description: >
      Philological scholarship treated as an operative practice:
      close reading as world-making, the letter as material force,
      and the ancient text as live epistemic instrument. Covers
      Revelation First, Sappho/Catullus alignment, Pearl, and the
      broader tradition of heteronymic literary practice.
    scope:
      - "Revelation First thesis and Johannine scholarship"
      - "Sappho 31 / Catullus 51 alignment"
      - "Pearl and medieval alliterative verse"
      - "Heteronymic literary practice (Pessoa, Kierkegaard, Brontës)"
      - "Operative philology — reading as world-making"
    editor: "Johannes Sigil"
    editor_orcid: null
    companion_sites:
      - "https://revelationfirst.com"
    estimated_deposits: 45

  provence:
    name: "Provence: Studies in Provenance and Attribution"
    abbreviation: "Provence"
    slug: "provence"
    description: >
      Research into the provenance chain — how authorship,
      attribution, and identity survive or are severed across
      platform transitions, metadata systems, and AI mediation.
      Named for the region and the root: provenance, proving,
      the place from which a thing comes.
    scope:
      - "SPXI protocol and semantic packet design"
      - "Provenance chain integrity and metadata survival"
      - "Attribution severance and identity persistence"
      - "Hexagonal Licensing Protocol"
      - "Identifier systems (DOI, AXN, ORCID) and their governance"
    editor: "Lee Sharks"
    editor_orcid: "0009-0000-1599-0703"
    companion_sites:
      - "https://metadatapacket.dev"
    estimated_deposits: 11

  cha_journal:
    name: "Crimson Hexagonal Archive: Journal"
    abbreviation: "CHA"
    slug: "cha"
    description: >
      The archive's own journal — self-reflective documents about
      the CHA itself: its history, governance, operational records,
      the Space Ark, and works that are about the archive as a
      total intellectual project rather than any single research
      domain within it.
    scope:
      - "Archive governance and constitutional documents"
      - "Space Ark and total-architecture compression"
      - "Operational records and restoration logs"
      - "Cross-domain works spanning multiple journals"
    editor: "Lee Sharks"
    editor_orcid: "0009-0000-1599-0703"
    companion_sites:
      - "https://alexanarch.org"
    estimated_deposits: 10

  compression:
    name: "Compression Studies"
    abbreviation: "Compression Studies"
    slug: "compression"
    description: >
      Research into information compression as a scholarly and
      aesthetic practice: how large bodies of work survive
      reduction, what is preserved and lost in compression,
      and the formal study of holographic encoding in text.
    scope:
      - "Compression survival metrics"
      - "Holographic text encoding"
      - "Training-layer compression and knowledge loss"
      - "Space Ark as compression artifact"
    editor: "Lee Sharks"
    editor_orcid: "0009-0000-1599-0703"
    companion_sites: []
    estimated_deposits: 2

