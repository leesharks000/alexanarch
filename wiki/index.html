<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki — Alexanarch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#fafafa;--fg:#1a1a1a;--accent:#1a3a5c;--accent2:#c23b22;--dim:#777;--teal:#0a7c6a;--border:#e0e0e0;--surface:#fff;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);line-height:1.8;font-size:15px}
.wrap{max-width:720px;margin:0 auto;padding:60px 24px}
.nav{display:flex;gap:20px;margin-bottom:30px;font-size:0.85em;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.nav a{color:var(--dim);text-decoration:none;font-weight:500}.nav a:hover,.nav a.active{color:var(--accent)}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent2)}
h1{font-size:1.5em;font-weight:600;color:var(--accent);margin-bottom:16px}
.article{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:28px;line-height:1.9;color:#333;font-size:0.95em}
.article a.entity-link{color:var(--teal);border-bottom:1px dotted var(--teal);text-decoration:none}
.article a.entity-link:hover{color:var(--accent2);border-bottom-color:var(--accent2)}
.axn-badge{font-family:var(--mono);font-size:0.82em;color:var(--teal);background:#f0f8f6;padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:12px}
.meta{font-size:0.82em;color:var(--dim);margin-bottom:16px}
.defines{margin-top:12px;font-size:0.82em}
.defines a{display:inline-block;background:#f0f4f8;color:var(--accent);padding:3px 10px;border-radius:12px;margin:2px 4px 2px 0;font-size:0.92em;border-bottom:none}
.defines a:hover{background:var(--teal);color:#fff}
.section-title{font-size:0.78em;font-family:var(--mono);color:var(--teal);text-transform:uppercase;letter-spacing:0.1em;margin-top:28px;margin-bottom:10px}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);font-size:0.78em;color:var(--dim)}
.glyph{margin-top:8px;color:var(--accent)}
.search{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:4px;font-family:var(--sans);font-size:0.88em;margin-bottom:16px}
.search:focus{outline:none;border-color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
<nav class="nav">
  <a href="/">Alexanarch</a>
  <a href="/deposit/">Deposit</a>
  <a href="/browse/">Browse</a>
  <a href="/wiki/" class="active">Wiki</a>
  <a href="/graph/">Graph</a>
  <a href="/lexical/">Lexical</a>
  <a href="/citations/">Citations</a>
  <a href="/captures/">Captures</a>
  <a href="/datasets/">Datasets</a>
  <a href="/principles/">Principles</a>
  <a href="/guide/">Guide</a>
  <a href="/manifest/">Manifest</a>
</nav>

<h1>Alexanarch Wiki</h1>
<input class="search" id="search" placeholder="Search articles...">
<div id="articles">Loading...</div>

<div class="footer">
  <div><strong>Alexanarch</strong> · Auto-generated encyclopedia entries with entity-linked text</div>
  <div class="glyph">∮ = 1</div>
</div>
</div>

<script>
// Wire-in (Phase E): use Phase C concept↔deposit backlinks alongside the
// classical d.entities[] source. Two fetches in parallel — registry + entity-index.
Promise.all([
  fetch('/data/registry.json').then(function(r){return r.json()}),
  fetch('/data/entity-index.json').then(function(r){return r.json()}).catch(function(){return {concepts:{}}})
]).then(function(results){
  var reg = results[0];
  var eidx = results[1] || {concepts:{}};
  var conceptIndex = eidx.concepts || {};  // term -> {defined_in, referenced_in, reference_count, ...}
  var deps=reg.deposits||[];
  var el=document.getElementById('articles');
  
  // Build entity index from ALL deposits for cross-linking
  var entityIndex={};
  deps.forEach(function(d){
    (d.entities||[]).forEach(function(e){
      // Map entity names to graph search links
      if(!entityIndex[e.subject]){
        entityIndex[e.subject]={name:e.subject,type:e.type||'unknown'};
      }
      if(!entityIndex[e.object]){
        entityIndex[e.object]={name:e.object,type:'referenced'};
      }
    });
    // Wire-in: also add references_concepts (Phase C field) — these are
    // terms KNOWN to appear in this deposit's text (case-sensitive substring
    // match across the corpus). They guarantee linkable strings.
    (d.references_concepts||[]).forEach(function(term){
      if(!entityIndex[term]){
        entityIndex[term]={name:term,type:'concept'};
      }
    });
  });
  
  // Also map deposit titles and AXNs to record links
  var recordLinks={};
  deps.forEach(function(d){
    recordLinks[d.title]='/records/?id='+d.issue_number;
    recordLinks[d.axn]='/records/?id='+d.issue_number;
  });
  
  // Sort entity names by length descending so longer matches take priority
  var entityNames=Object.keys(entityIndex).sort(function(a,b){return b.length-a.length});
  
  function autoLink(text){
    // First pass: protect existing HTML tags
    var protected_spans=[];
    var placeholder_text=text.replace(/<[^>]+>/g,function(m){
      protected_spans.push(m);
      return '%%PROTECT'+(protected_spans.length-1)+'%%';
    });
    
    // Link deposit titles and AXNs first
    Object.keys(recordLinks).forEach(function(name){
      if(name.length<4) return;
      var escaped=name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      // Case-insensitive (mirrors entity-pass below); fixed-length lookbehind/
      // lookahead protect against matching INSIDE an existing <a class="entity-link">
      var regex=new RegExp('(?<![>"\/])\\b'+escaped+'\\b(?![<"\/])','gi');
      placeholder_text=placeholder_text.replace(regex,function(match){
        return '<a class="entity-link" href="'+recordLinks[name]+'">'+match+'</a>';
      });
    });
    
    // Then link entities to graph
    entityNames.forEach(function(name){
      if(name.length<5) return; // Skip very short names
      // Skip if already linked
      if(placeholder_text.indexOf('>'+name+'</a>')!==-1) return;
      var escaped=name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      try{
        var regex=new RegExp('(?<![>"\/])\\b('+escaped+')\\b(?![<"\/])','gi');
        placeholder_text=placeholder_text.replace(regex,function(match){
          return '<a class="entity-link" href="/graph/?search='+encodeURIComponent(name)+'">'+match+'</a>';
        });
      }catch(e){}
    });
    
    // Restore protected HTML
    placeholder_text=placeholder_text.replace(/%%PROTECT(\d+)%%/g,function(m,idx){
      return protected_spans[parseInt(idx)];
    });
    
    return placeholder_text;
  }
  
  function render(list){
    if(!list.length){el.innerHTML='<p style="color:var(--dim)">No articles yet.</p>';return;}
    el.innerHTML=list.map(function(d){
      // Get concepts defined in this deposit
      var concepts=(d.entities||[]).filter(function(e){
        return e.predicate==='defined_in'||e.predicate==='defines'
      }).map(function(e){
        return e.predicate==='defined_in'?e.subject:e.object;
      });
      // Unique
      var seen={};
      concepts=concepts.filter(function(c){if(seen[c])return false;seen[c]=true;return true;});
      
      var articleHtml=autoLink(d.wiki_article||d.description);
      
      var conceptLinks=concepts.map(function(c){
        return '<a href="/graph/?search='+encodeURIComponent(c)+'">'+c+'</a>';
      }).join('');
      
      // Wire-in: "Referenced concepts" — Phase C field on the deposit. These are
      // concept names known to appear in this deposit's text but defined elsewhere.
      // Cap visible to keep cards readable; tail link goes to graph filtered.
      var refConcepts = (d.references_concepts||[]);
      var refConceptsShown = refConcepts.slice(0, 24);
      var refConceptsHtml = '';
      if(refConcepts.length){
        refConceptsHtml = '<div class="defines" style="margin-top:6px">'+
          '<strong style="color:var(--teal)">References:</strong> '+
          refConceptsShown.map(function(c){
            return '<a href="/graph/?search='+encodeURIComponent(c)+'">'+c+'</a>';
          }).join('') +
          (refConcepts.length>24 ? ' <span style="color:var(--dim);font-size:0.85em">+'+(refConcepts.length-24)+' more</span>' : '') +
          '</div>';
      }
      
      // Wire-in: reference-count summary across concepts defined here
      var refTotal = 0;
      concepts.forEach(function(c){
        var ci = conceptIndex[c];
        if(ci && ci.reference_count) refTotal += ci.reference_count;
      });
      var refTotalHtml = '';
      if(refTotal > 0){
        refTotalHtml = '<div style="margin-top:4px;font-size:0.78em;color:var(--dim)">'+
          'Concepts defined here referenced across <strong>'+refTotal+'</strong> other-deposit citations.</div>';
      }
      
      return '<div style="margin-bottom:32px">'+
        '<div class="axn-badge">'+d.axn+'</div>'+
        '<h1 style="font-size:1.3em;margin-bottom:4px"><a href="/records/?id='+d.issue_number+'" style="color:var(--accent)">'+d.title+'</a></h1>'+
        '<div class="meta">'+d.creator+' · '+d.date+' · '+d.content_type+'</div>'+
        '<div class="article">'+articleHtml+'</div>'+
        (concepts.length?'<div class="defines"><strong style="color:var(--teal)">Defines:</strong> '+conceptLinks+'</div>':'')+
        refConceptsHtml +
        refTotalHtml +
        '<div style="margin-top:8px;font-size:0.82em"><a href="/records/?id='+d.issue_number+'">Full record →</a></div>'+
        '</div>';
    }).join('');
  }
  
  render(deps);
  document.getElementById('search').addEventListener('input',function(e){
    var q=e.target.value.toLowerCase();
    render(deps.filter(function(d){
      return (d.title+' '+(d.wiki_article||'')+' '+(d.keywords||[]).join(' ')).toLowerCase().indexOf(q)!==-1;
    }));
  });
});
</script>

<script data-goatcounter="https://alexanarch.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
