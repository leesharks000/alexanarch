<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record — Alexanarch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#fafafa;--fg:#1a1a1a;--accent:#1a3a5c;--accent2:#c23b22;--dim:#777;--teal:#0a7c6a;--border:#e0e0e0;--surface:#fff;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);line-height:1.7;font-size:15px}
.wrap{max-width:720px;margin:0 auto;padding:60px 24px}
.nav{display:flex;gap:20px;margin-bottom:30px;font-size:0.85em}
.nav a{color:var(--dim);text-decoration:none;font-weight:500}.nav a:hover{color:var(--accent)}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent2)}
h1{font-size:1.5em;font-weight:600;color:var(--accent);margin-bottom:8px}
.axn-display{font-family:var(--mono);font-size:1.3em;color:var(--teal);background:var(--surface);padding:16px 20px;border-radius:6px;border:1px solid var(--border);border-left:4px solid var(--teal);margin:16px 0}
.axn-clusters{font-size:0.72em;color:var(--dim);margin-top:4px}
.axn-reading{font-size:0.82em;color:#888;font-style:italic;margin-top:2px}
.meta-grid{display:grid;grid-template-columns:140px 1fr;gap:0;margin:20px 0;font-size:0.88em}
.meta-label{font-weight:500;color:var(--accent);font-family:var(--mono);font-size:0.82em;padding:8px 0}
.meta-value{color:#444;padding:8px 0;border-bottom:1px solid #f0f0f0}
.section-title{font-size:0.78em;font-family:var(--mono);color:var(--teal);text-transform:uppercase;letter-spacing:0.1em;margin-top:28px;margin-bottom:8px}
.keywords{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.kw{background:#f0f4f8;color:var(--accent);padding:3px 10px;border-radius:12px;font-size:0.78em}
.dl-btn{display:inline-block;background:var(--accent);color:#fff;padding:10px 20px;border-radius:4px;font-size:0.88em;font-weight:500;margin:4px 6px 4px 0;text-decoration:none;transition:background 0.2s}
.dl-btn:hover{background:var(--teal);color:#fff;text-decoration:none}
.dl-btn-outline{background:transparent;color:var(--accent);border:1px solid var(--border)}
.dl-btn-outline:hover{background:var(--accent);color:#fff}
.verify{background:#f8f8f0;border:1px solid #e8e8d0;border-radius:6px;padding:16px;margin:20px 0;font-size:0.82em}
.verify code{font-family:var(--mono);background:#f0f0e8;padding:2px 6px;border-radius:3px;font-size:0.9em}
.full-text{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:28px 24px;margin:20px 0;font-size:0.9em;line-height:1.8;color:#333}
.full-text h1,.full-text h2,.full-text h3{color:var(--accent);margin-top:24px;margin-bottom:8px}
.full-text h1{font-size:1.3em;border-bottom:2px solid var(--border);padding-bottom:6px}
.full-text h2{font-size:1.1em;border-bottom:1px solid var(--border);padding-bottom:4px}
.full-text h3{font-size:0.95em;color:var(--teal)}
.full-text p{margin-bottom:12px}
.full-text table{width:100%;border-collapse:collapse;margin:16px 0;font-size:0.9em}
.full-text th,.full-text td{padding:6px 10px;border:1px solid var(--border);text-align:left}
.full-text th{background:#f4f4f4;font-weight:500;color:var(--accent)}
.full-text blockquote{border-left:3px solid var(--teal);padding:8px 16px;margin:12px 0;color:#555;background:#fafaf4}
.full-text strong{color:var(--fg)}
.full-text hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.full-text ul,.full-text ol{margin:8px 0 8px 20px}
.full-text li{margin-bottom:4px}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);font-size:0.78em;color:var(--dim)}
.glyph{margin-top:8px;color:var(--accent)}
#loading{text-align:center;padding:60px 0;color:var(--dim)}
#error{display:none;text-align:center;padding:40px;color:var(--accent2)}
.tab-bar{display:flex;gap:0;margin:20px 0 0;border-bottom:2px solid var(--border)}
.tab{padding:8px 20px;font-size:0.85em;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab:hover{color:var(--accent)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-content{display:none}.tab-content.active{display:block}
</style>
</head>
<body>
<div class="wrap">

<nav class="nav">
  <a href="/">Alexanarch</a>
  <a href="/deposit/">Deposit</a>
  <a href="/browse/">Browse</a>
  <a href="/principles/">Principles</a>
  <a href="/identifiers/">Identifiers</a>
  <a href="/manifest/">Manifest</a>
</nav>

<div id="loading">Loading record...</div>
<div id="error">Record not found. <a href="/browse/">Browse all deposits →</a></div>
<div id="record" style="display:none"></div>

<div class="footer">
  <div><strong>Alexanarch</strong> · <a href="https://orcid.org/0009-0000-1599-0703">ORCID 0009-0000-1599-0703</a></div>
  <div class="glyph">∮ = 1</div>
</div>

</div>

<script>
const W={Celestial:'Origin',Elemental:'Force',Architectural:'Foundation',Instrumental:'Method',Scriptural:'Text',Navigational:'Search',Temporal:'Duration',Organic:'Growth',Symbolic:'Play',Mathematical:'Proof',Alchemical:'Transmutation',Gestural:'Touch',Signal:'Alarm',Structural:'Direction',Liminal:'Threshold',Terminal:'Closure'};

function getQuery(){
  const params=new URLSearchParams(window.location.search);
  return params.get('axn')||params.get('id')||params.get('issue')||decodeURIComponent(window.location.hash.slice(1))||'';
}

function mdToHtml(md){
  // Simple markdown renderer
  let html=md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^\*\*(.+?)\*\*$/gm,'<p><strong>$1</strong></p>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^\| (.+)$/gm,function(m){
      const cells=m.split('|').filter(c=>c.trim());
      if(cells.every(c=>/^[\s-:]+$/.test(c))) return '';
      const tag=cells.some(c=>/\*\*/.test(c))?'th':'td';
      return '<tr>'+cells.map(c=>'<'+tag+'>'+c.trim().replace(/\*\*/g,'')+'</'+tag+'>').join('')+'</tr>';
    })
    .replace(/(<tr>[\s\S]*?<\/tr>)/g,function(m,p1,offset,str){
      if(offset===0||str[offset-1]==='
') return '<table>'+m+'</table>';
      return m;
    });
  // Wrap bare lines in <p>
  html=html.split('
').map(line=>{
    line=line.trim();
    if(!line) return '';
    if(line.startsWith('<')) return line;
    return '<p>'+line+'</p>';
  }).join('
');
  // Clean up consecutive blockquotes and tables
  html=html.replace(/<\/blockquote>
<blockquote>/g,'
')
    .replace(/<\/table>
<table>/g,'
');
  return html;
}

fetch('/data/registry.json').then(r=>r.json()).then(reg=>{
  const q=getQuery();
  const deps=reg.deposits||[];
  let d=null;
  for(const dep of deps){
    if(dep.axn===q||dep.axn==='AXN:'+q||dep.emoji===q||dep.hex===q||String(dep.issue_number)===q||dep.title.toLowerCase().includes(q.toLowerCase())){
      d=dep;break;
    }
  }
  if(!d&&deps.length===1&&!q) d=deps[0];
  document.getElementById('loading').style.display='none';
  if(!d){document.getElementById('error').style.display='block';return;}
  
  document.title=d.title+' — Alexanarch';
  const clusters=(d.clusters||[]).join(' · ');
  const reading=(d.clusters||[]).map(c=>W[c]||c).join(' → ');
  const kws=(d.keywords||[]).map(k=>'<span class="kw">'+k+'</span>').join('');
  
  // Build mirror download buttons
  let dlButtons='';
  if(d.mirrors){
    Object.entries(d.mirrors).forEach(([k,v])=>{
      dlButtons+='<a class="dl-btn dl-btn-outline" href="'+v+'" target="_blank">'+k+' →</a>';
    });
  }
  if(d.issue_url){
    dlButtons+='<a class="dl-btn dl-btn-outline" href="'+d.issue_url+'" target="_blank">deposit record →</a>';
  }
  
  const el=document.getElementById('record');
  el.style.display='block';
  el.innerHTML=`
    <div class="axn-display">
      ${d.axn}
      <div class="axn-clusters">${clusters}</div>
      <div class="axn-reading">${reading}</div>
    </div>
    <h1>${d.title}</h1>
    <div style="font-size:0.88em;color:var(--dim);margin-bottom:16px">${d.creator}${d.orcid?' · <a href="https://orcid.org/'+d.orcid+'">ORCID</a>':''} · ${d.date} · ${d.content_type}</div>
    
    <div style="margin:16px 0">${dlButtons}</div>
    
    <div class="tab-bar">
      <div class="tab active" onclick="showTab('full')">Full Text</div>
      <div class="tab" onclick="showTab('meta')">Metadata</div>
      <div class="tab" onclick="showTab('verify')">Verify</div>
    </div>
    
    <div class="tab-content active" id="tab-full">
      <div id="full-text-container" class="full-text" style="margin-top:0;border-top:none;border-radius:0 0 6px 6px">
        <div style="color:var(--dim);padding:20px;text-align:center">Loading full text...</div>
      </div>
    </div>
    
    <div class="tab-content" id="tab-meta">
      <div style="padding:20px 0">
        <div class="meta-grid">
          <div class="meta-label">AXN</div><div class="meta-value" style="font-family:var(--mono)">${d.axn}</div>
          <div class="meta-label">Creator</div><div class="meta-value">${d.creator}${d.orcid?' · <a href="https://orcid.org/'+d.orcid+'">'+d.orcid+'</a>':''}</div>
          <div class="meta-label">Date</div><div class="meta-value">${d.date}</div>
          <div class="meta-label">Content Type</div><div class="meta-value">${d.content_type}</div>
          <div class="meta-label">Substrate</div><div class="meta-value">${d.substrate}</div>
          <div class="meta-label">License</div><div class="meta-value">${d.license}</div>
          <div class="meta-label">Version</div><div class="meta-value">${d.version||'—'}</div>
          <div class="meta-label">Status</div><div class="meta-value" style="color:var(--teal)">${d.status}</div>
          <div class="meta-label">Minted</div><div class="meta-value">${d.minted_at?new Date(d.minted_at).toLocaleDateString():'—'}</div>
          <div class="meta-label">SHA-256</div><div class="meta-value" style="font-family:var(--mono);font-size:0.82em;word-break:break-all">${d.hash||'—'}</div>
        </div>
        ${kws?'<div class="section-title">Keywords</div><div class="keywords">'+kws+'</div>':''}
        ${d.methodology?'<div class="section-title">Methodology</div><div style="font-size:0.88em;color:#444;margin:8px 0">'+d.methodology+'</div>':''}
        ${d.falsification?'<div class="section-title">Falsification Conditions</div><div style="font-size:0.88em;color:#444;margin:8px 0">'+d.falsification+'</div>':''}
        ${d.related_ids?'<div class="section-title">Related</div><div style="font-size:0.85em"><a href="'+d.related_ids+'">'+d.related_ids+'</a></div>':''}
      </div>
    </div>
    
    <div class="tab-content" id="tab-verify">
      <div class="verify" style="margin-top:0;border-top:none;border-radius:0 0 6px 6px">
        <div class="section-title">Verify This Identifier</div>
        <p>Compute the SHA-256 of the deposit content. Map the first 4 bytes through the <a href="https://github.com/leesharks000/alexanarch/blob/main/GLYPH_SPEC.md">AXN glyph table</a>. The result should be: <strong>${d.emoji}</strong></p>
        <p>Full hash: <code>${d.hash||'—'}</code></p>
        <p>Clusters: ${clusters}</p>
        <p>Reading: <em>${reading}</em></p>
      </div>
    </div>
  `;
  
  // Fetch full text from mirrors
  const mdUrl=d.mirrors&&d.mirrors.machinemediation;
  if(mdUrl){
    fetch(mdUrl).then(r=>r.text()).then(md=>{
      document.getElementById('full-text-container').innerHTML=mdToHtml(md);
    }).catch(()=>{
      // Try blog mirror
      document.getElementById('full-text-container').innerHTML=
        '<div style="color:var(--dim);padding:20px"><p>'+d.description+'</p><div style="margin-top:16px">'+dlButtons+'</div></div>';
    });
  } else {
    document.getElementById('full-text-container').innerHTML=
      '<div style="padding:20px"><p>'+d.description+'</p><div style="margin-top:16px">'+dlButtons+'</div></div>';
  }
}).catch(e=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('error').style.display='block';
});

function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
