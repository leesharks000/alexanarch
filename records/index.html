<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting — Alexanarch</title>
<meta http-equiv="refresh" content="0; url=/s/browse/">
<script>
// Redirect /records/?id=N → /s/records/N/ — the static counterpart.
// The dynamic page previously rendered Markdown with a permissive raw-HTML
// pass-through (XSS risk per audit §6, §20). The static record at
// /s/records/N/ is safe, has full content, JSON-LD metadata, and supports
// linear / no-JS reading.
(function(){
  try {
    var p = new URLSearchParams(window.location.search);
    var id = p.get('id');
    if (id && /^\d+$/.test(id)) {
      window.location.replace('/s/records/' + id + '/');
    } else {
      window.location.replace('/s/browse/');
    }
  } catch (e) {
    window.location.href = '/s/browse/';
  }
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
body{font-family:'IBM Plex Sans',sans-serif;background:#fafafa;color:#1a1a1a;line-height:1.7;font-size:15px;padding:60px 24px;max-width:720px;margin:0 auto}
a{color:#1a3a5c}
</style>
</head>
<body>
<noscript>
<h1>Redirecting…</h1>
<p>The dynamic record path has moved. Static record pages with full content live at <code>/s/records/&lt;N&gt;/</code> where <code>N</code> is the deposit number.</p>
<p><a href="/s/browse/">Browse all deposits →</a></p>
</noscript>
<p>Redirecting to the static record page… If you aren't redirected automatically, <a href="/s/browse/">browse all deposits</a>.</p>
</body>
</html>
