<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse — Alexanarch</title>
<link rel="canonical" href="https://alexanarch.org">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#fafafa;--fg:#1a1a1a;--accent:#1a3a5c;--accent2:#c23b22;--dim:#777;--teal:#0a7c6a;--border:#e0e0e0;--surface:#fff;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);line-height:1.7;font-size:15px}
.wrap{max-width:760px;margin:0 auto;padding:60px 24px}
h1{font-size:2.2em;font-weight:600;color:var(--accent);letter-spacing:-0.02em;margin-bottom:4px}
h2{font-size:1.1em;font-weight:500;color:var(--accent);margin-bottom:16px;margin-top:32px;padding-bottom:6px;border-bottom:2px solid var(--border)}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent2);text-decoration:underline}
.tagline{font-size:1.05em;color:var(--dim);font-weight:300;margin-bottom:30px}
.nav{display:flex;gap:20px;margin-bottom:30px;font-size:0.85em}
.nav a{color:var(--dim);text-decoration:none;font-weight:500}.nav a:hover,.nav a.active{color:var(--accent)}
p{margin-bottom:14px;font-size:0.92em;color:#444;line-height:1.7}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);font-size:0.78em;color:var(--dim)}
.glyph{margin-top:8px;color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
<h1>Alexanarch</h1>
<div class="tagline">The self-governing library.</div>
<nav class="nav">
  <a href="/">Home</a>
  <a href="/deposit/">Deposit</a>
  <a href="/browse/" class="active">Browse</a>
  <a href="/principles/">Principles</a>
  <a href="/identifiers/">Identifiers</a>
  <a href="/manifest/">Manifest</a>
</nav>

<h2>Browse the Collection</h2>
<div id="stats" style="color:var(--dim);font-size:0.88em;margin-bottom:20px">Loading registry...</div>
<input id="search" placeholder="Search deposits..." style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:4px;font-family:var(--sans);font-size:0.9em;margin-bottom:16px">
<div id="deposits"></div>
<script>
fetch('/data/registry.json').then(r=>r.json()).then(reg=>{
  const deps=reg.deposits||[];
  document.getElementById('stats').textContent=deps.length?
    deps.length+' deposits in the registry':
    'No deposits yet. Be the first — submit a work.';
  function render(list){
    document.getElementById('deposits').innerHTML=list.length?
      list.map(d=>`<div style="background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:16px;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:0.82em;color:var(--teal)">${d.axn}</div>
        <div style="font-weight:500;margin:4px 0"><a href="/records/?axn=${encodeURIComponent(d.axn)}" style="color:var(--fg)">${d.title}</a></div>
        <div style="font-size:0.82em;color:#777">${d.creator} · ${d.date} · ${d.content_type} · ${d.substrate}</div>
        <div style="font-size:0.82em;color:#999;margin-top:4px">${(d.description||'').substring(0,200)}</div>
      </div>`).join(''):
      '<p style="color:#999">No matching deposits.</p>';
  }
  render(deps);
  document.getElementById('search').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    render(deps.filter(d=>(d.title+d.creator+d.description+d.axn+(d.keywords||[]).join(' ')).toLowerCase().includes(q)));
  });
});
</script>

<div class="footer">
  <div><strong>Alexanarch</strong> · Founded June 2026 · Lee Sharks · <a href="https://orcid.org/0009-0000-1599-0703">ORCID 0009-0000-1599-0703</a></div>
  <div class="glyph">∮ = 1</div>
</div>
</div>
</body>
</html>
